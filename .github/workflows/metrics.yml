name: Metrics

on:
  # Refresh once a day
  schedule:
    - cron: "30 5 * * *"
  # Allow manual runs (used for the first render)
  workflow_dispatch:

# The built-in GITHUB_TOKEN only needs write access to THIS repo,
# so it can commit the generated SVG back. Your PAT stays read-only.
permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      # Pinned to the v3.34 release commit (not a moving tag) for supply-chain safety
      - uses: lowlighter/metrics@65836723097537a54cd8eb90f61839426b4266b6
        with:
          # Read-only fine-grained PAT (Contents: Read + Metadata: Read). Reads stats only.
          token: ${{ secrets.METRICS_TOKEN }}
          # Commits the rendered SVG back to this repo only. Never your PAT.
          committer_token: ${{ secrets.GITHUB_TOKEN }}

          user: lihai-benhaim
          filename: github-metrics.svg
          template: classic
          config_timezone: Asia/Jerusalem

          # Base panels: header + repo stats (repo stats include "lines of code changed")
          base: header, activity, community, repositories, metadata

          # Include private repos you own / collaborate on / are an org member of
          repositories_affiliations: owner, collaborator, organization_member

          # Full-year 3D commit calendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # Detailed lines-of-code added/removed
          plugin_lines: yes
          plugin_lines_sections: base
          plugin_lines_repositories_limit: 100
